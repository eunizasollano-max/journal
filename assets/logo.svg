<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 360">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Dancing+Script:wght@600&amp;display=swap');
      .logo-day    { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; fill: #5c3d3d; }
      .logo-chance { font-family: 'Dancing Script', cursive; font-weight: 600; fill: #c06478; }
    </style>

    <radialGradient id="paper" cx="50%" cy="38%" r="78%">
      <stop offset="0%"  stop-color="#fdf5f5"/>
      <stop offset="100%" stop-color="#f2dada"/>
    </radialGradient>

    <!-- Petal symbols, tip pointing up (-y) -->
    <path id="pOut"  d="M0,0 C-26,-18 -20,-70 0,-86 C20,-70 26,-18 0,0 Z"/>
    <path id="pMid"  d="M0,0 C-20,-14 -16,-54 0,-66 C16,-54 20,-14 0,0 Z"/>
    <path id="pIn"   d="M0,0 C-15,-10 -12,-40 0,-48 C12,-40 15,-10 0,0 Z"/>
    <path id="pTiny" d="M0,0 C-9,-6 -7,-24 0,-29 C7,-24 9,-6 0,0 Z"/>

    <!-- Leaf symbol, tip pointing +x -->
    <path id="leaf" d="M0,0 Q60,-26 130,0 Q60,26 0,0 Z"/>
  </defs>

  <!-- Background -->
  <rect width="300" height="360" fill="url(#paper)"/>

  <!-- ══ WORDMARK ══ -->
  <path d="M65,46 C82,14 168,10 197,40" stroke="#e8b4b8" stroke-width="1.6"
        fill="none" stroke-linecap="round" opacity=".6"/>
  <text x="150" y="60" text-anchor="middle" class="logo-day" font-size="32">another day,</text>
  <text x="150" y="100" text-anchor="middle" class="logo-chance" font-size="38">another chance</text>

  <!-- ══ LEAF BACKING (behind bloom) ══ -->
  <g transform="translate(150,250)">
    <g transform="rotate(8)  scale(.8)"><use href="#leaf" fill="#a8b5a0" opacity=".9"/></g>
    <g transform="rotate(52) scale(.78)"><use href="#leaf" fill="#bcc9ad" opacity=".9"/></g>
    <g transform="rotate(96) scale(.8)"><use href="#leaf" fill="#c8d5c0" opacity=".88"/></g>
    <g transform="rotate(140) scale(.78)"><use href="#leaf" fill="#a8b5a0" opacity=".9"/></g>
    <g transform="rotate(184) scale(.8)"><use href="#leaf" fill="#bcc9ad" opacity=".9"/></g>
    <g transform="rotate(228) scale(.78)"><use href="#leaf" fill="#c8d5c0" opacity=".88"/></g>
    <g transform="rotate(272) scale(.8)"><use href="#leaf" fill="#a8b5a0" opacity=".9"/></g>
    <g transform="rotate(316) scale(.78)"><use href="#leaf" fill="#bcc9ad" opacity=".9"/></g>
  </g>

  <!-- ══ BLOOM ══ -->
  <g transform="translate(150,250)">
    <!-- Outer layer: 9 petals -->
    <use href="#pOut" transform="rotate(0)"   fill="#e29ba8" opacity=".95"/>
    <use href="#pOut" transform="rotate(40)"  fill="#e29ba8" opacity=".93"/>
    <use href="#pOut" transform="rotate(80)"  fill="#e8909c" opacity=".93"/>
    <use href="#pOut" transform="rotate(120)" fill="#e8909c" opacity=".92"/>
    <use href="#pOut" transform="rotate(160)" fill="#e29ba8" opacity=".92"/>
    <use href="#pOut" transform="rotate(200)" fill="#e29ba8" opacity=".93"/>
    <use href="#pOut" transform="rotate(240)" fill="#e8909c" opacity=".93"/>
    <use href="#pOut" transform="rotate(280)" fill="#e8909c" opacity=".92"/>
    <use href="#pOut" transform="rotate(320)" fill="#e29ba8" opacity=".94"/>

    <!-- Mid layer: 9 petals, offset 20° -->
    <use href="#pMid" transform="rotate(20)"  fill="#f0a8b8" opacity=".93"/>
    <use href="#pMid" transform="rotate(60)"  fill="#f0a8b8" opacity=".92"/>
    <use href="#pMid" transform="rotate(100)" fill="#f2b4c2" opacity=".92"/>
    <use href="#pMid" transform="rotate(140)" fill="#f2b4c2" opacity=".91"/>
    <use href="#pMid" transform="rotate(180)" fill="#f0a8b8" opacity=".92"/>
    <use href="#pMid" transform="rotate(220)" fill="#f0a8b8" opacity=".92"/>
    <use href="#pMid" transform="rotate(260)" fill="#f2b4c2" opacity=".91"/>
    <use href="#pMid" transform="rotate(300)" fill="#f2b4c2" opacity=".92"/>
    <use href="#pMid" transform="rotate(340)" fill="#f0a8b8" opacity=".93"/>

    <!-- Inner layer: 8 petals -->
    <use href="#pIn" transform="rotate(10)"  fill="#f4c0cc" opacity=".93"/>
    <use href="#pIn" transform="rotate(55)"  fill="#f6cdd6" opacity=".92"/>
    <use href="#pIn" transform="rotate(100)" fill="#f4c0cc" opacity=".92"/>
    <use href="#pIn" transform="rotate(145)" fill="#f6cdd6" opacity=".91"/>
    <use href="#pIn" transform="rotate(190)" fill="#f4c0cc" opacity=".92"/>
    <use href="#pIn" transform="rotate(235)" fill="#f6cdd6" opacity=".92"/>
    <use href="#pIn" transform="rotate(280)" fill="#f4c0cc" opacity=".91"/>
    <use href="#pIn" transform="rotate(325)" fill="#f6cdd6" opacity=".92"/>

    <!-- Innermost ruffle: 10 tiny petals -->
    <use href="#pTiny" transform="rotate(0)"   fill="#fce8ee" opacity=".94"/>
    <use href="#pTiny" transform="rotate(36)"  fill="#fdeef2" opacity=".93"/>
    <use href="#pTiny" transform="rotate(72)"  fill="#fce8ee" opacity=".93"/>
    <use href="#pTiny" transform="rotate(108)" fill="#fdeef2" opacity=".93"/>
    <use href="#pTiny" transform="rotate(144)" fill="#fce8ee" opacity=".93"/>
    <use href="#pTiny" transform="rotate(180)" fill="#fdeef2" opacity=".93"/>
    <use href="#pTiny" transform="rotate(216)" fill="#fce8ee" opacity=".93"/>
    <use href="#pTiny" transform="rotate(252)" fill="#fdeef2" opacity=".93"/>
    <use href="#pTiny" transform="rotate(288)" fill="#fce8ee" opacity=".93"/>
    <use href="#pTiny" transform="rotate(324)" fill="#fdeef2" opacity=".93"/>

    <!-- Golden stamens cluster -->
    <ellipse cx="0" cy="-2" rx="16" ry="13" fill="#c98a3a" opacity=".55"/>
    <g stroke="#e0a83c" stroke-width="2" opacity=".9">
      <line x1="0" y1="0" x2="-14" y2="-10"/>
      <line x1="0" y1="0" x2="-6"  y2="-16"/>
      <line x1="0" y1="0" x2="4"  y2="-17"/>
      <line x1="0" y1="0" x2="13" y2="-11"/>
      <line x1="0" y1="0" x2="16" y2="-1"/>
      <line x1="0" y1="0" x2="11" y2="9"/>
      <line x1="0" y1="0" x2="-2" y2="14"/>
      <line x1="0" y1="0" x2="-12" y2="8"/>
    </g>
    <g fill="#f0c460">
      <circle cx="-14" cy="-10" r="2.6"/><circle cx="-6" cy="-16" r="2.6"/><circle cx="4" cy="-17" r="2.6"/>
      <circle cx="13" cy="-11" r="2.6"/><circle cx="16" cy="-1" r="2.6"/><circle cx="11" cy="9" r="2.6"/>
      <circle cx="-2" cy="14" r="2.6"/><circle cx="-12" cy="8" r="2.6"/>
    </g>
    <circle cx="0" cy="-2" r="4" fill="#a8701e" opacity=".7"/>
  </g>
</svg>
